<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Work Tracker</title>
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --surface-light: #2c2c2c;
            --text: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent: #00c896;
            --amber: #ffb300;
            --blue: #2196f3;
            --danger: #cf6679;
            --border: #333333;
            --font-main: system-ui, -apple-system, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overscroll-behavior-y: none;
            padding-bottom: 90px;
        }

        .mono { font-family: var(--font-mono); }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 { font-size: 1.25rem; font-weight: 600; }
        
        button {
            border: none;
            background: none;
            color: var(--text);
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        .icon-btn { font-size: 1.5rem; padding: 4px; display: flex; align-items: center; justify-content: center;}

        main { padding: 16px; display: flex; flex-direction: column; gap: 20px; }

        /* Active Job Card */
        #active-card {
            background-color: var(--surface);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 12px rgba(0, 200, 150, 0.1);
        }

        .active-info { display: flex; flex-direction: column; gap: 4px; }
        .active-label { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--accent); font-weight: 600; text-transform: uppercase; }
        .pulsing-dot {
            width: 10px; height: 10px;
            background-color: var(--accent);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 200, 150, 0.6); }
            70% { box-shadow: 0 0 0 8px rgba(0, 200, 150, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 200, 150, 0); }
        }
        .active-time { font-size: 2rem; font-weight: bold; }
        
        /* Form */
        .form-card {
            background-color: var(--surface);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 0.85rem; color: var(--text-muted); }
        .input-group input, .input-group select {
            width: 100%;
            background-color: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
        }
        .input-group input:focus, .input-group select:focus {
            border-color: var(--accent);
            outline: none;
        }
        
        .btn-primary {
            background-color: var(--accent);
            color: var(--bg);
            font-size: 1rem;
            font-weight: bold;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            transition: background-color 0.2s;
        }

        .hidden { display: none !important; }

        /* Sessions List */
        .sessions-container { display: flex; flex-direction: column; gap: 12px; }
        .date-header { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; margin-top: 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px;}
        .session-item {
            background-color: var(--surface);
            border-radius: 8px;
            padding: 12px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            font-size: 0.9rem;
        }
        .session-times { color: var(--text-muted); font-size: 0.85rem; }

        /* Action Buttons */
        .actions-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }
        .btn-end-cycle { background-color: var(--blue); color: white; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 1rem; text-align: center; }
        .btn-end-cycle:disabled { background-color: var(--surface-light); color: var(--text-muted); opacity: 0.7; cursor: not-allowed; }
        .btn-clear { background-color: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 14px; border-radius: 8px; font-weight: bold; font-size: 1rem; }

        /* Side Menu (Archive) */
        #archive-menu {
            position: fixed;
            top: 0; right: 0; bottom: 0; width: 85%; max-width: 320px;
            background-color: var(--surface);
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            box-shadow: -4px 0 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        #archive-menu.open { transform: translateX(0); }
        .archive-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid var(--border); }
        .archive-list { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .archive-item {
            background-color: var(--surface-light);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .archive-info { display: flex; flex-direction: column; gap: 4px; cursor: pointer; flex: 1; }
        .btn-delete { color: var(--danger); padding: 8px; font-size: 1.2rem; }

        /* Overlays & Modals */
        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 90;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .overlay.active { opacity: 1; pointer-events: auto; }

        .bottom-sheet {
            position: fixed; left: 0; right: 0; bottom: 0;
            background-color: var(--surface);
            border-top-left-radius: 16px; border-top-right-radius: 16px;
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            display: flex; flex-direction: column;
            max-height: 90vh;
        }
        .bottom-sheet.open { transform: translateY(0); }
        .sheet-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .sheet-content { padding: 16px; overflow-y: auto; }
        
        pre.output-text {
            background-color: var(--bg);
            padding: 16px;
            border-radius: 8px;
            color: var(--text);
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-bottom: 16px;
        }

        .btn-copy { background-color: var(--accent); color: var(--bg); width: 100%; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 1rem; }
        .btn-confirm-danger { background-color: var(--danger); color: white; width: 100%; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 1rem; margin-top: 12px; }
        .btn-cancel { background-color: var(--surface-light); color: var(--text); width: 100%; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 1rem; margin-top: 8px; }

        /* Toast */
        #toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
            background-color: var(--text); color: var(--bg);
            padding: 12px 24px; border-radius: 24px; font-weight: 500; font-size: 0.9rem;
            z-index: 200; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

    </style>
</head>
<body>

    <header>
        <h1>Work Tracker</h1>
        <button id="menu-btn" class="icon-btn">☰</button>
    </header>

    <main>
        <!-- Active Session Card -->
        <div id="active-card" class="hidden">
            <div class="active-info">
                <div class="active-label"><div class="pulsing-dot"></div> Active Job</div>
                <div class="mono" id="active-job-details" style="font-size: 0.9rem; margin-top: 4px;"></div>
            </div>
            <div class="active-time mono" id="active-start-time"></div>
        </div>

        <!-- Job Form -->
        <div class="form-card">
            <div class="input-group">
                <label>Worker Name</label>
                <input type="text" id="worker-name" placeholder="Enter your name..." inputmode="text">
            </div>

            <div id="job-inputs">
                <div class="input-group">
                    <label>Job Order Number</label>
                    <input type="text" id="job-order" class="mono" placeholder="e.g. 850421.01" inputmode="text">
                </div>
                <div class="input-group" style="margin-top: 12px;">
                    <label>Drawing Number</label>
                    <input type="text" id="drawing-number" class="mono" placeholder="e.g. 10-0005-8691" inputmode="text">
                </div>
            </div>
            
            <div class="input-group">
                <label>Work Activity</label>
                <select id="work-activity">
                    <option value="CNC programming">CNC Programming</option>
                    <option value="custom">Custom activity...</option>
                    <option value="end_time">End working time</option>
                </select>
            </div>

            <div class="input-group hidden" id="custom-activity-wrapper">
                <label>Custom Activity</label>
                <input type="text" id="custom-activity" placeholder="Describe activity...">
            </div>

            <button id="main-action-btn" class="btn-primary">Start Job</button>
        </div>

        <!-- Sessions List -->
        <div id="sessions-list" class="sessions-container"></div>

        <!-- Actions -->
        <div class="actions-row">
            <button id="end-cycle-btn" class="btn-end-cycle">End Cycle</button>
            <button id="clear-cycle-btn" class="btn-clear">Clear Cycle</button>
        </div>
    </main>

    <!-- Overlay -->
    <div id="overlay" class="overlay"></div>

    <!-- Archive Menu -->
    <div id="archive-menu">
        <div class="archive-header">
            <h2>Archive</h2>
            <button id="close-menu-btn" class="icon-btn">✕</button>
        </div>
        <div id="archive-list" class="archive-list"></div>
    </div>

    <!-- Output Bottom Sheet -->
    <div id="output-sheet" class="bottom-sheet">
        <div class="sheet-header">
            <h3>Cycle Output</h3>
            <button id="close-output-btn" class="icon-btn">✕</button>
        </div>
        <div class="sheet-content">
            <pre id="output-display" class="output-text mono"></pre>
            <button id="copy-btn" class="btn-copy">Copy to Clipboard</button>
        </div>
    </div>

    <!-- Confirm Clear Sheet -->
    <div id="confirm-sheet" class="bottom-sheet">
        <div class="sheet-header">
            <h3>Confirm Clear</h3>
        </div>
        <div class="sheet-content">
            <p style="margin-bottom: 16px; color: var(--text-muted);">Are you sure you want to clear the current cycle? This cannot be undone.</p>
            <button id="confirm-clear-btn" class="btn-confirm-danger">Yes, Clear Cycle</button>
            <button id="cancel-clear-btn" class="btn-cancel">Cancel</button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script>
        // --- Core Logic & Data ---
        const STORE_CYCLE = 'workTracker_currentCycle';
        const STORE_ARCHIVE = 'workTracker_archive';
        const STORE_NAME = 'workTracker_workerName';

        let currentCycle = { id: generateId(), sessions: [] };
        let archive = {};

        // --- DOM Elements ---
        const elements = {
            workerName: document.getElementById('worker-name'),
            activeCard: document.getElementById('active-card'),
            activeJobDetails: document.getElementById('active-job-details'),
            activeStartTime: document.getElementById('active-start-time'),
            jobInputs: document.getElementById('job-inputs'),
            jobOrder: document.getElementById('job-order'),
            drawingNumber: document.getElementById('drawing-number'),
            workActivity: document.getElementById('work-activity'),
            customActivityWrapper: document.getElementById('custom-activity-wrapper'),
            customActivity: document.getElementById('custom-activity'),
            mainActionBtn: document.getElementById('main-action-btn'),
            sessionsList: document.getElementById('sessions-list'),
            endCycleBtn: document.getElementById('end-cycle-btn'),
            clearCycleBtn: document.getElementById('clear-cycle-btn'),
            overlay: document.getElementById('overlay'),
            archiveMenu: document.getElementById('archive-menu'),
            archiveList: document.getElementById('archive-list'),
            menuBtn: document.getElementById('menu-btn'),
            closeMenuBtn: document.getElementById('close-menu-btn'),
            outputSheet: document.getElementById('output-sheet'),
            closeOutputBtn: document.getElementById('close-output-btn'),
            outputDisplay: document.getElementById('output-display'),
            copyBtn: document.getElementById('copy-btn'),
            confirmSheet: document.getElementById('confirm-sheet'),
            confirmClearBtn: document.getElementById('confirm-clear-btn'),
            cancelClearBtn: document.getElementById('cancel-clear-btn'),
            toast: document.getElementById('toast')
        };

        // --- Init ---
        function init() {
            loadData();
            setupEventListeners();
            renderUI();
            registerPWA();
        }

        // --- Storage ---
        function loadData() {
            const savedCycle = localStorage.getItem(STORE_CYCLE);
            if (savedCycle) currentCycle = JSON.parse(savedCycle);
            
            const savedArchive = localStorage.getItem(STORE_ARCHIVE);
            if (savedArchive) archive = JSON.parse(savedArchive);

            const savedName = localStorage.getItem(STORE_NAME);
            if (savedName) elements.workerName.value = savedName;
        }

        function saveCycle() {
            localStorage.setItem(STORE_CYCLE, JSON.stringify(currentCycle));
        }

        function saveArchive() {
            localStorage.setItem(STORE_ARCHIVE, JSON.stringify(archive));
        }

        // --- Utils ---
        function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
        
        function pad(n) { return n < 10 ? '0' + n : n; }
        
        function getCurrentDateStr() {
            const d = new Date();
            return `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()}`;
        }
        
        function getCurrentTimeStr() {
            const d = new Date();
            return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function showToast(msg) {
            elements.toast.textContent = msg;
            elements.toast.classList.add('show');
            setTimeout(() => elements.toast.classList.remove('show'), 3000);
        }

        function getActiveSession() {
            return currentCycle.sessions.find(s => s.endTime === null);
        }

        // --- Event Handlers ---
        function setupEventListeners() {
            elements.workerName.addEventListener('input', () => {
                localStorage.setItem(STORE_NAME, elements.workerName.value);
            });
            elements.workActivity.addEventListener('change', handleActivityChange);
            elements.mainActionBtn.addEventListener('click', handleMainAction);
            elements.endCycleBtn.addEventListener('click', handleEndCycle);
            elements.clearCycleBtn.addEventListener('click', () => openSheet(elements.confirmSheet));
            
            // Modals & Menus
            elements.menuBtn.addEventListener('click', openArchive);
            elements.closeMenuBtn.addEventListener('click', closeArchive);
            elements.overlay.addEventListener('click', closeAllModals);
            elements.closeOutputBtn.addEventListener('click', () => closeSheet(elements.outputSheet));
            
            // Clear confirmation
            elements.confirmClearBtn.addEventListener('click', executeClearCycle);
            elements.cancelClearBtn.addEventListener('click', () => closeSheet(elements.confirmSheet));
            
            // Copy
            elements.copyBtn.addEventListener('click', copyOutput);
        }

        function handleActivityChange() {
            const val = elements.workActivity.value;
            
            elements.customActivityWrapper.classList.toggle('hidden', val !== 'custom');
            
            if (val === 'end_time') {
                elements.jobInputs.classList.add('hidden');
                elements.mainActionBtn.textContent = 'End Working Time';
                elements.mainActionBtn.style.backgroundColor = 'var(--amber)';
            } else {
                elements.jobInputs.classList.remove('hidden');
                elements.mainActionBtn.textContent = 'Start Job';
                elements.mainActionBtn.style.backgroundColor = 'var(--accent)';
            }
        }

        function handleMainAction() {
            const isEndingTime = elements.workActivity.value === 'end_time';
            const activeSession = getActiveSession();

            // End current session if exists
            if (activeSession) {
                activeSession.endTime = getCurrentTimeStr();
            }

            if (isEndingTime) {
                if (!activeSession) {
                    showToast('No active job to end');
                    return;
                }
                showToast('Working time ended');
            } else {
                // Starting new job
                const jobOrder = elements.jobOrder.value.trim();
                const drawingNumber = elements.drawingNumber.value.trim();
                let activity = elements.workActivity.value;
                
                if (activity === 'custom') {
                    activity = elements.customActivity.value.trim();
                    if (!activit
